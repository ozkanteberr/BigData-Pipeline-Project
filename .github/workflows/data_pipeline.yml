name: Big Data Pipeline CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install sqlfluff
        run: pip install sqlfluff sqlfluff-templater-dbt

      - name: Lint dbt Models
        run: |
          cd dbt_project
          sqlfluff lint models --dialect sparksql || echo "Linting finished with warnings."

  validate-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Airflow
        run: docker compose -f docker/docker-compose-airflow.yml config -q
        
      - name: Validate Docker Compose Spark
        run: docker compose -f docker/docker-compose-spark.yml config -q
