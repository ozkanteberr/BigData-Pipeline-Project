# Apache Superset for Olist Big Data Pipeline
# Web UI: http://localhost:8088
# Login:  admin / admin

services:
  superset-db:
    image: postgres:15-alpine
    container_name: superset-db
    hostname: superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset_password
    volumes:
      - superset_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bigdata-net

  superset-redis:
    image: redis:7-alpine
    container_name: superset-redis
    hostname: superset-redis
    restart: unless-stopped
    networks:
      - bigdata-net

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    hostname: superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      DATABASE_URL: "postgresql+psycopg2://superset:superset_password@superset-db:5432/superset"
      REDIS_URL: "redis://superset-redis:6379/0"
      SUPERSET_SECRET_KEY: "olist-bigdata-secret-change-in-prod"
      SUPERSET_LOAD_EXAMPLES: "no"
      PYTHONPATH: /app/pythonpath
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        echo "Initializing Superset database..."
        superset db upgrade
        echo "Creating admin user..."
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@olist.com \
          --password admin || true
        echo "Initializing roles..."
        superset init
        echo "Starting Superset server..."
        gunicorn \
          --bind 0.0.0.0:8088 \
          --workers 4 \
          --worker-class gthread \
          --threads 20 \
          --timeout 120 \
          --limit-request-line 0 \
          --limit-request-field_size 0 \
          "superset.app:create_app()"
    networks:
      - bigdata-net

volumes:
  superset_db:

networks:
  bigdata-net:
    external: true
    name: bigdata-net
